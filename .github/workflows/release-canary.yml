name: Release Canary

on:
    push:
        branches: [main]
        paths-ignore:
            - "README.md"
            - "LICENSE.md"
            - "scripts/**"
            - ".github/**"
    release:
        types: [released, prereleased]
    workflow_dispatch:

permissions:
    contents: write
    packages: write

concurrency:
    group: canary_environment
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  run_install: true
            - uses: ok-nick/setup-aftman@v0.4.2
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Compile
              run: pnpm build --verbose

            - name: Build project
              run: rojo build --output place.rbxlx

            - name: Upload place artifact
              uses: actions/upload-artifact@v4
              with:
                  name: place
                  path: place.rbxlx

    deploy:
        runs-on: self-hosted
        environment: canary
        needs: build

        steps:
            - name: Install GitHub CLI
              run: |
                  type -p curl >/dev/null || (sudo apt-get update && sudo apt-get install curl -y)
                  curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
                  && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
                  && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
                  && sudo apt update \
                  && sudo apt install gh -y

            - uses: actions/checkout@v4
            - uses: ok-nick/setup-aftman@v0.4.2
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Download place artifact
              uses: actions/download-artifact@v4
              with:
                  name: place

            - name: Deploy game
              run: mantle deploy --allow-purchases --environment canary
              env:
                  ROBLOSECURITY: ${{ secrets.ROBLOSECURITY }}
                  MANTLE_AWS_ACCESS_KEY_ID: ${{ secrets.MANTLE_AWS_ACCESS_KEY_ID }}
                  MANTLE_AWS_SECRET_ACCESS_KEY: ${{ secrets.MANTLE_AWS_SECRET_ACCESS_KEY }}
                  MANTLE_OPEN_CLOUD_API_KEY: ${{ secrets.MANTLE_OPEN_CLOUD_API_KEY }}
