# If it's a group, you need to change it to this:
owner:
  group: 34579161

state:
  remote:
    region:
      custom:
        name: eeur
        endpoint: https://a8f126f6517bc4d89de7b0091a93209d.eu.r2.cloudflarestorage.com/trimateh-mantle-states
    bucket: trimateh-mantle-states
    key: exp2-qonquer

environments:
  - label: canary
    targetNamePrefix: environmentLabel
    targetAccess: public
    targetOverrides:
      icon: assets/marketing/game_icon_canary.png
      thumbnails: [assets/marketing/game_thumbnail_canary.png]
      places:
        start:
          configuration:
            name: Divide and Qonquer DEV 🚧
            description: |
              This is a development build of Divide and Qonquer. Your feedback is appreciated ❤️

              🚧  Proceed with caution: You may encounter bugs, data resets, and instability.
              🔥  Take a look at upcoming features before they're shipped to production.
              🤝  Send your feedback to the group wall or the linked socials!

            maxPlayerCount: 50
  - label: production
    branches: [main]
    targetAccess: public

target:
  experience:
    icon: assets/marketing/game_icon.png
    thumbnails: [assets/marketing/game_thumbnail.png]
    socialLinks:
      - title: 🤝・Community
        url: https://www.roblox.com/groups/34579161/Trimatech-Games#!/about
    configuration:
      playableDevices: [computer, console, phone, tablet]
      privateServers:
        price: 10
      enableStudioAccessToApis: true
      avatarType: playerChoice
      avatarAnimationType: playerChoice
    spatialVoice:
      enabled: true
    places:
      start:
        file: place.rbxlx
        configuration:
          name: Divide and Qonquer ⚔️
          description: |
            Experiment 2: Divide and Qonquer is a strategic game where players compete to claim sections of a large circular arena by drawing boundary lines from their territories.

            ⚔️  Conquer the largest share of the circle by expanding your territory.
            🛡️  Strategically avoid other players to maintain your conquered area.
            🎯  Balance offense and defense to establish dominance in the arena.

            Please like ❤️ and favorite ⭐️ if you enjoyed Divide and Qonquer!
            Follow 🔔 to be notified of new updates!

          maxPlayerCount: 25
    assets:
      - assets/sounds/*
